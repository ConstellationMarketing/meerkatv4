name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.55.248.2
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -euo pipefail
            cd /root/meerkat-service
            git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/ConstellationMarketing/meerkatv4.git
            git fetch origin main
            git reset --hard origin/main
            npm install --omit=dev
            pm2 restart meerkat --update-env
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
