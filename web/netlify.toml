[build]
  command = "pnpm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  NPM_FLAGS = "--version"
  VITE_SUPABASE_URL = "https://cwligyakhxevopxiksdm.supabase.co"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  
# /health → Netlify Function for the OS Health Check Bot. Must sit above
# the /* SPA fallback or the probe gets HTML instead of JSON.
[[redirects]]
  force = true
  from = "/health"
  status = 200
  to = "/.netlify/functions/health"

[[redirects]]
  force = true
  from = "/api/webhook*"
  status = 200
  to = "/.netlify/functions/webhook-handler"

[[redirects]]
  force = true
  from = "/api/team-members"
  status = 200
  to = "/.netlify/functions/team-members"

[[redirects]]
  force = true
  from = "/api/delete-user"
  status = 200
  to = "/.netlify/functions/delete-user"

[[redirects]]
  force = true
  from = "/api/delete-user-cascade"
  status = 200
  to = "/.netlify/functions/delete-user-cascade"

[[redirects]]
  force = true
  from = "/api/article-access"
  status = 200
  to = "/.netlify/functions/article-access"

[[redirects]]
  force = true
  from = "/api/comments"
  status = 200
  to = "/.netlify/functions/comments"

[[redirects]]
  force = true
  from = "/api/send-to-webhook"
  status = 200
  to = "/.netlify/functions/send-to-webhook"

[[redirects]]
  force = true
  from = "/api/chat"
  status = 200
  to = "/.netlify/functions/chat"

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# Server-rendered article view per language. Must sit above the /* SPA
# fallback so `curl` on /share-article/:id[/:lang] gets translated HTML in
# the initial response, not the React shell.
[[redirects]]
  force = true
  from = "/share-article/:articleId/:lang"
  status = 200
  to = "/.netlify/functions/share-article-ssr?id=:articleId&lang=:lang"

[[redirects]]
  force = true
  from = "/share-article/:articleId"
  status = 200
  to = "/.netlify/functions/share-article-ssr?id=:articleId"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
